<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân tích số liệu Pro - Căn chỉnh lề</title>
    <style>
        :root {
            --primary: #007bff;
            --bg-high: #ffd700; 
            --bg-low: #4caf50;  
            --body-bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --input-bg: #2d2d2d;
            --control-bg: #252525;
            --border-color: #333;
            --cell-size: 30px;
            --cell-gap: 5px;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--body-bg);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 1200px;
            box-sizing: border-box;
        }

        /* Hộp nổi cố định */
        .sticky-header {
            position: sticky;
            top: 5px;
            z-index: 100;
            background: var(--control-bg);
            padding: 15px 3px; /* Đã bổ sung 3px trái phải ở đây */
            border-radius: 10px;
            border: 2px solid #444;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            overflow-x: hidden; 
        }

        .header-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
        }

        .sync-grid {
            display: grid;
            gap: var(--cell-gap);
            justify-content: start;
            width: max-content;
            /* Loại bỏ margin auto để sát về lề trái có padding */
        }

        .index-box {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            color: white;
        }

        /* Màu STT lung linh */
        .idx-0 { background: linear-gradient(135deg, #ff4b1f, #ff9068); }
        .idx-1 { background: linear-gradient(135deg, #1fddff, #1291ff); }
        .idx-2 { background: linear-gradient(135deg, #ff00cc, #333399); }
        .idx-3 { background: linear-gradient(135deg, #00f260, #0575e6); }
        .idx-4 { background: linear-gradient(135deg, #f12711, #f5af19); }
        .idx-5 { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
        .idx-6 { background: linear-gradient(135deg, #f953c6, #b91d73); }
        .idx-7 { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .idx-8 { background: linear-gradient(135deg, #eb3349, #f45c43); }
        .idx-9 { background: linear-gradient(135deg, #4568dc, #b06ab3); }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--control-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; font-size: 13px; color: #aaa; }
        input { 
            padding: 10px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            background: var(--input-bg); 
            color: white; 
            font-size: 16px; 
        }

        .btn-group { display: flex; gap: 8px; margin-top: 5px; }
        .main-btn { flex: 1; color: white; border: none; padding: 12px 5px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-high { background-color: #b8860b; }
        .btn-low { background-color: #2e7d32; }

        /* Vùng kết quả cuộn ngang */
        #result-container { 
            overflow-x: auto; 
            width: 100%;
            background: #1a1a1a;
            padding: 15px 3px; /* Đã bổ sung 3px trái phải ở đây */
            border-radius: 8px;
            -webkit-overflow-scrolling: touch;
            box-sizing: border-box;
        }

        .number-box {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 4px;
            font-size: 18px;
            background: #333;
            color: #fff;
        }

        .high { background-color: var(--bg-high) !important; color: #000 !important; box-shadow: 0 0 8px var(--bg-high); }
        .low { background-color: var(--bg-low) !important; color: #fff !important; box-shadow: 0 0 8px var(--bg-low); }

        @media (min-width: 600px) {
            .controls { flex-direction: row; align-items: flex-end; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header" id="headerWrapper">
        <div class="header-title">Thanh đối chiếu STT</div>
        <div id="header-grid" class="sync-grid"></div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Chọn File (.txt)</label>
            <input type="file" id="fileInput" accept=".txt">
        </div>
        <div class="control-group">
            <label>Độ dài dòng (x)</label>
            <input type="number" id="rowLength" value="10" min="1">
        </div>
        <div class="btn-group">
            <button class="main-btn btn-high" onclick="processData('high')">TÔ VÀNG (≥5)</button>
            <button class="main-btn btn-low" onclick="processData('low')">TÔ XANH (<5)</button>
        </div>
    </div>

    <div id="result-container">
        <div id="result-grid" class="sync-grid"></div>
    </div>
</div>

<script>
    const rowLengthInput = document.getElementById('rowLength');
    const headerGrid = document.getElementById('header-grid');
    const resultContainer = document.getElementById('result-container');
    const headerWrapper = document.getElementById('headerWrapper');

    resultContainer.onscroll = function() {
        headerWrapper.scrollLeft = resultContainer.scrollLeft;
    };

    window.onload = function() {
        const savedLength = localStorage.getItem('userRowLength');
        if (savedLength) rowLengthInput.value = savedLength;
        updateHeaderGrid();
    };

    rowLengthInput.addEventListener('input', function() {
        localStorage.setItem('userRowLength', rowLengthInput.value);
        updateHeaderGrid();
    });

    function updateHeaderGrid() {
        const x = parseInt(rowLengthInput.value) || 10;
        headerGrid.style.gridTemplateColumns = `repeat(${x}, var(--cell-size))`;
        headerGrid.innerHTML = '';
        for (let i = 0; i < x; i++) {
            const stt = i % 10;
            const box = document.createElement('div');
            box.className = `index-box idx-${stt}`;
            box.textContent = stt;
            headerGrid.appendChild(box);
        }
    }

    function processData(mode) {
        const fileInput = document.getElementById('fileInput');
        const x = parseInt(rowLengthInput.value);
        if (!fileInput.files[0]) { alert("Vui lòng tải file!"); return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            const rawText = e.target.result;
            const cleanText = rawText.replace(/\\/g, ' ').replace(/\\/gi, ' ');
            const numbers = cleanText.trim().split(/[\s,]+/).map(Number).filter(n => !isNaN(n));
            renderGrid(numbers, x, mode);
        };
        reader.readAsText(fileInput.files[0]);
    }

    function renderGrid(data, columns, mode) {
        const grid = document.getElementById('result-grid');
        grid.innerHTML = ''; 
        grid.style.gridTemplateColumns = `repeat(${columns}, var(--cell-size))`;
        data.forEach(num => {
            const box = document.createElement('div');
            box.className = 'number-box';
            box.textContent = num;
            if (mode === 'high' && num >= 5) box.classList.add('high');
            else if (mode === 'low' && num < 5) box.classList.add('low');
            grid.appendChild(box);
        });
    }
</script>

</body>
</html>
