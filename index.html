<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân tích số liệu Compact Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --body-bg: #0a0a0c;
            --card-bg: #16161e;
            --input-bg: #1f1f29;
            --text-main: #e1e1e6;
            --text-dim: #9494b8;
            --primary: #3d5afe;
            --gold: #ffcc00;
            --green: #00e676;
            --danger: #ff5252;
            --cell-size: 32px; /* Kích thước ô gọn gàng */
            --gap: 3px;
            --radius: 8px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1000px; }

        /* Header dính gọn nhẹ */
        .sticky-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(8px);
            padding: 8px 0; margin-bottom: 10px;
            border-bottom: 1px solid #2d2d3d;
            overflow-x: auto; scrollbar-width: none;
        }
        .sticky-header::-webkit-scrollbar { display: none; }

        /* Bảng điều khiển tối ưu không gian */
        .controls {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 15px; margin-bottom: 15px;
            display: flex; flex-direction: column; gap: 12px;
            border: 1px solid #2d2d3d;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .row { display: flex; gap: 10px; flex-wrap: wrap; }
        .control-group { flex: 1; min-width: 140px; display: flex; flex-direction: column; gap: 4px; }
        
        label { 
            font-size: 10px; color: var(--text-dim); 
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }

        input {
            background: var(--input-bg);
            border: 1px solid #333; border-radius: 6px;
            padding: 8px 10px; color: white;
            font-family: 'JetBrains Mono', monospace; font-size: 13px;
            outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); }

        /* Nút bấm Compact */
        .btn-group { display: flex; gap: 8px; width: 100%; }
        .main-btn {
            flex: 1; border: none; padding: 10px; border-radius: 6px;
            font-weight: 700; cursor: pointer; font-size: 11px;
            text-transform: uppercase; transition: 0.2s;
        }
        .btn-apply { background: var(--primary); color: white; }
        .btn-reset { background: transparent; color: var(--danger); border: 1px solid var(--danger); flex: 0 0 110px; }
        .btn-high { background: var(--gold); color: #000; }
        .btn-low { background: var(--green); color: #000; }
        .main-btn:active { transform: scale(0.96); }

        /* Thanh thông tin */
        .info-bar {
            background: #1e1e2e; padding: 10px; border-radius: 6px;
            text-align: center; font-size: 13px; margin-bottom: 15px;
            border-left: 4px solid var(--primary);
        }

        /* Container hiển thị số */
        #result-container {
            width: 100%; background: #0d0d12;
            border-radius: var(--radius); padding: 12px;
            box-sizing: border-box; border: 1px solid #2d2d3d;
            overflow-x: auto;
        }

        .sync-grid { display: grid; gap: var(--gap); width: max-content; margin: 0 auto; }

        .number-box, .index-box {
            width: var(--cell-size); height: var(--cell-size);
            display: flex; justify-content: center; align-items: center;
            font-weight: 700; border-radius: 4px;
            font-family: 'JetBrains Mono', monospace; font-size: 14px;
        }

        .index-box { color: white; font-size: 11px; }
        .idx-0 { background: #ff4b1f; } .idx-1 { background: #0052D4; } 
        .idx-2 { background: #8E2DE2; } .idx-3 { background: #11998e; }
        .idx-4 { background: #f09819; } .idx-5 { background: #4568dc; }
        .idx-6 { background: #D4145A; } .idx-7 { background: #009245; }
        .idx-8 { background: #662D8C; } .idx-9 { background: #2E3192; }

        .number-box { 
            background: #1a1a24; color: #505066; 
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* Highlight trạng thái */
        .high { 
            background: var(--gold) !important; color: #000 !important; 
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.4); 
        }
        .low { 
            background: var(--green) !important; color: #000 !important; 
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.4);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header" id="headerWrapper">
        <div id="header-grid" class="sync-grid"></div>
    </div>

    <div class="controls">
        <div class="row">
            <div class="control-group">
                <label>File dữ liệu (.txt)</label>
                <input type="file" id="fileInput" accept=".txt">
            </div>
            <div class="control-group">
                <label>Số cột (X)</label>
                <input type="number" id="rowLength" value="10" min="1">
            </div>
        </div>

        <div class="control-group">
            <label>Chuỗi T1 (A: ≥5, B: <5)</label>
            <div class="btn-group">
                <input type="text" id="t1Input" style="flex: 1;" placeholder="VD: AAAbbb">
                <button class="main-btn btn-apply" onclick="applyT1()">Áp dụng</button>
                <button class="main-btn btn-reset" onclick="clearMemory()">Dọn Cache</button>
            </div>
        </div>

        <div class="btn-group">
            <button class="main-btn btn-high" onclick="processData('high')">Lọc số lớn (≥ 5)</button>
            <button class="main-btn btn-low" onclick="processData('low')">Lọc số nhỏ (< 5)</button>
        </div>
    </div>

    <div class="info-bar">
        Quy tắc: <span id="current-t1-display" style="color: var(--primary); font-weight: bold;">--</span> 
        | Dữ liệu: <span id="total-count" style="color: var(--green);">0</span> số
    </div>

    <div id="result-container">
        <div id="result-grid" class="sync-grid"></div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const rowLengthInput = document.getElementById('rowLength');
    const t1Input = document.getElementById('t1Input');
    const currentT1Display = document.getElementById('current-t1-display');
    const headerGrid = document.getElementById('header-grid');
    const resultGrid = document.getElementById('result-grid');
    const resultContainer = document.getElementById('result-container');
    const headerWrapper = document.getElementById('headerWrapper');
    const totalCountSpan = document.getElementById('total-count');

    let currentNumbers = []; 

    // Đồng bộ cuộn giữa header và bảng kết quả
    resultContainer.addEventListener('scroll', () => {
        headerWrapper.scrollLeft = resultContainer.scrollLeft;
    });

    window.onload = function() {
        rowLengthInput.value = localStorage.getItem('userRowLength') || 10;
        const savedT1 = localStorage.getItem('userT1') || 'AAAb';
        t1Input.value = savedT1;
        currentT1Display.textContent = savedT1;
        
        const savedData = localStorage.getItem('userCurrentNumbers');
        if (savedData) {
            currentNumbers = JSON.parse(savedData);
            totalCountSpan.textContent = currentNumbers.length;
            refreshAll();
        }
        updateHeaderGrid();
    };

    function clearMemory() {
        if(confirm("Xóa toàn bộ thiết lập và dữ liệu đã lưu?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function refreshAll() {
        const x = parseInt(rowLengthInput.value) || 10;
        const mode = localStorage.getItem('userLastMode') || '';
        updateHeaderGrid();
        renderGrid(currentNumbers, x, mode);
    }

    function applyT1() {
        const val = t1Input.value.trim();
        if(!val) return alert("Vui lòng nhập T1!");
        localStorage.setItem('userT1', val);
        currentT1Display.textContent = val;
        refreshAll();
    }

    fileInput.addEventListener('change', function() {
        if (!this.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const rawText = e.target.result.trim();
            // Đọc dữ liệu thô và lọc lấy các chữ số đơn lẻ
            const cleanText = rawText.replace(/[\s\r\n\\,]+/g, '');
            currentNumbers = cleanText.split('').map(Number).filter(n => !isNaN(n));
            
            localStorage.setItem('userCurrentNumbers', JSON.stringify(currentNumbers));
            totalCountSpan.textContent = currentNumbers.length;
            refreshAll();
        };
        reader.readAsText(this.files[0]);
    });

    rowLengthInput.addEventListener('input', () => {
        localStorage.setItem('userRowLength', rowLengthInput.value);
        refreshAll();
    });

    function updateHeaderGrid() {
        const x = parseInt(rowLengthInput.value) || 10;
        headerGrid.style.gridTemplateColumns = `repeat(${x}, var(--cell-size))`;
        headerGrid.innerHTML = '';
        for (let i = 0; i < x; i++) {
            const box = document.createElement('div');
            box.className = `index-box idx-${i % 10}`;
            box.textContent = i % 10;
            headerGrid.appendChild(box);
        }
    }

    function processData(mode) {
        if (currentNumbers.length === 0) return alert("Chưa có dữ liệu!");
        localStorage.setItem('userLastMode', mode);
        refreshAll();
    }

    function renderGrid(data, columns, mode) {
        resultGrid.innerHTML = ''; 
        if (data.length === 0) return;
        resultGrid.style.gridTemplateColumns = `repeat(${columns}, var(--cell-size))`;
        
        const fragment = document.createDocumentFragment();
        data.forEach((num) => {
            const box = document.createElement('div');
            box.className = 'number-box';
            box.textContent = num;
            
            // Logic tô màu đơn giản:
            // Nút "Lọc số lớn": Tô vàng số >= 5
            // Nút "Lọc số nhỏ": Tô xanh số < 5
            if (mode === 'high' && num >= 5) {
                box.classList.add('high');
            } else if (mode === 'low' && num < 5) {
                box.classList.add('low');
            }
            
            fragment.appendChild(box);
        });
        resultGrid.appendChild(fragment);
    }
</script>

</body>
</html>
